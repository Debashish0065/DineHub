<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Edit Profile | DineHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:linear-gradient(135deg,#ff7b00,#ffb347);

display:flex;

justify-content:center;

align-items:center;

padding:40px;

}

.container{

width:100%;
max-width:700px;

}

.card{

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

padding:40px;

border-radius:25px;

box-shadow:0 15px 35px rgba(0,0,0,.25);

border:1px solid rgba(255,255,255,.25);

color:white;

}

.card h1{

text-align:center;

margin-bottom:30px;

font-size:34px;

}

.form-group{

margin-bottom:22px;

}

.form-group label{

display:block;

margin-bottom:8px;

font-weight:600;

}

.form-group input,

.form-group textarea{

width:100%;

padding:14px;

border:none;

border-radius:12px;

font-size:15px;

outline:none;

background:rgba(255,255,255,.9);

color:#333;

}

.form-group textarea{

height:120px;

resize:none;

}

.readonly{

background:#ececec !important;

cursor:not-allowed;

}

.buttons{

margin-top:35px;

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.btn{

padding:14px 28px;

text-decoration:none;

border:none;

border-radius:12px;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.save{

background:#28a745;

color:white;

}

.save:hover{

background:#218838;

}

.back{

background:#333;

color:white;

}

.back:hover{

background:#111;

}

.success{

background:#28a745;

padding:12px;

border-radius:10px;

margin-bottom:20px;

text-align:center;

}

.error{

background:#dc3545;

padding:12px;

border-radius:10px;

margin-bottom:20px;

text-align:center;

}

@media(max-width:768px){

.card{

padding:25px;

}

.card h1{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Edit Profile</h1>

<div th:if="${success}" class="success" th:text="${success}"></div>

<div th:if="${error}" class="error" th:text="${error}"></div>
<form th:action="@{/profile/update}"
      th:object="${user}"
      method="post">

<div class="form-group">

<label>First Name</label>

<input
       type="text"
       th:field="*{firstName}"
       placeholder="Enter First Name"
       required>

</div>

<div class="form-group">

<label>Last Name</label>

<input
       type="text"
       th:field="*{lastName}"
       placeholder="Enter Last Name"
       required>

</div>

<div class="form-group">

<label>Phone Number</label>

<input
       type="text"
       th:field="*{phone}"
       placeholder="Enter Phone Number"
       required>

</div>

<div class="form-group">

<label>Email Address</label>

<input
       type="email"
       th:field="*{email}"
       class="readonly"
       readonly>

</div>

<div class="form-group">

<label>Address</label>

<textarea
          th:field="*{address}"
          placeholder="Enter Address"
          required>
</textarea>

</div>

<div class="buttons">

<button
        type="submit"
        class="btn save">

💾 Save Changes

</button>

<a
   th:href="@{/profile}"
   class="btn back">

← Back to Profile

</a>

</div>

</form>
</div>

</div>

</body>

</html>
