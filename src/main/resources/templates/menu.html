<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DineHub | Menu</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <link rel="stylesheet"
          th:href="@{/css/menu.css}">

</head>

<body>

<div class="menu-container">

    <!-- ========================= -->
    <!-- MENU HEADER -->
    <!-- ========================= -->

    <div class="menu-header"
         style="text-align:center;
                padding:45px 20px;">

        <h1 class="menu-title"
            style="font-size:3rem;
                   font-weight:800;
                   color:white;
                   margin-bottom:15px;">

            🍽 Explore Our Delicious Menu

        </h1>

        <p style="color:#f5f5f5;
                  font-size:18px;
                  margin-bottom:35px;">

            Fresh • Delicious • Fast Delivery

        </p>

        <!-- ========================= -->
        <!-- SEARCH + FILTER -->
        <!-- ========================= -->

        <form th:action="@{/menu}"
              method="get"
              style="display:flex;
                     justify-content:center;
                     align-items:center;
                     gap:15px;
                     flex-wrap:wrap;
                     max-width:1000px;
                     margin:auto;">

            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="🔍 Search your favourite food..."
                   style="flex:1;
                          min-width:280px;
                          padding:15px 22px;
                          border:none;
                          border-radius:35px;
                          font-size:16px;
                          outline:none;">

            <select name="category"
                    style="padding:15px 22px;
                           border:none;
                           border-radius:35px;
                           min-width:220px;
                           font-size:16px;
                           outline:none;">

                <option value=""
                        th:selected="${selectedCategory == null}">
                    All Categories
                </option>

                <option value="Pizza"
                        th:selected="${selectedCategory == 'Pizza'}">
                    🍕 Pizza
                </option>

                <option value="Burger"
                        th:selected="${selectedCategory == 'Burger'}">
                    🍔 Burger
                </option>

                <option value="Chinese"
                        th:selected="${selectedCategory == 'Chinese'}">
                    🍜 Chinese
                </option>

                <option value="Drinks"
                        th:selected="${selectedCategory == 'Drinks'}">
                    🥤 Drinks
                </option>

                <option value="Dessert"
                        th:selected="${selectedCategory == 'Dessert'}">
                    🍰 Dessert
                </option>

                <option value="Snacks"
                        th:selected="${selectedCategory == 'Snacks'}">
                    🍟 Snacks
                </option>

            </select>

            <button type="submit"
                    style="background:#ff8c00;
                           color:white;
                           border:none;
                           border-radius:35px;
                           padding:15px 35px;
                           font-size:16px;
                           font-weight:600;
                           cursor:pointer;">

                🔍 Search

            </button>

            <a th:href="@{/menu}"
               style="background:#444;
                      color:white;
                      text-decoration:none;
                      border-radius:35px;
                      padding:15px 30px;
                      font-weight:600;">

                Reset

            </a>

        </form>

    </div>

    <!-- ========================= -->
    <!-- NO PRODUCTS FOUND -->
    <!-- ========================= -->

    <div class="no-products"
         th:if="${#lists.isEmpty(products)}"
         style="text-align:center;
                padding:60px;
                color:white;">

        <h2>No Products Found 😔</h2>

        <p style="margin-top:10px;">

            Try another keyword or category.

        </p>

        <br>

        <a th:href="@{/menu}"
           style="color:#ff8c00;
                  font-weight:bold;">

            View All Products

        </a>

    </div>
	<!-- ========================= -->
	<!-- PRODUCTS GRID -->
	<!-- ========================= -->

	<div class="products-grid"
	     th:if="${!#lists.isEmpty(products)}"
	     style="display:grid;
	            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
	            gap:30px;
	            max-width:1350px;
	            margin:40px auto;
	            padding:20px;">

	    <div class="product-card"
	         th:each="product : ${products}"
	         style="background:white;
	                border-radius:20px;
	                overflow:hidden;
	                box-shadow:0 15px 40px rgba(0,0,0,.18);
	                transition:.35s;">

	        <!-- PRODUCT IMAGE -->

	        <div style="height:220px;
	                    overflow:hidden;">

	            <img th:src="${product.imageUrl != null ? product.imageUrl : '/images/default-food.jpg'}"
	                 alt="Food Image"
	                 style="width:100%;
	                        height:100%;
	                        object-fit:cover;">

	        </div>

	        <!-- PRODUCT DETAILS -->

	        <div style="padding:22px;">

	            <span style="display:inline-block;
	                         background:#ff8c00;
	                         color:white;
	                         padding:6px 15px;
	                         border-radius:20px;
	                         font-size:13px;
	                         margin-bottom:15px;">

	                <span th:text="${product.category.categoryName}"></span>

	            </span>

	            <h3 th:text="${product.productName}"
	                style="font-size:24px;
	                       margin-bottom:12px;
	                       color:#222;">
	            </h3>

	            <p th:text="${product.description}"
	               style="color:#666;
	                      line-height:1.6;
	                      min-height:70px;">
	            </p>

	            <div style="display:flex;
	                        justify-content:space-between;
	                        align-items:center;
	                        margin-top:25px;">

	                <h2 style="color:#ff8c00;
	                           margin:0;">

	                    ₹<span th:text="${product.price}"></span>

	                </h2>

	                <form th:action="@{'/add-to-cart/' + ${product.id}}"
	                      method="post">

	                    <button type="submit"
	                            style="background:#ff8c00;
	                                   color:white;
	                                   border:none;
	                                   padding:12px 24px;
	                                   border-radius:30px;
	                                   cursor:pointer;
	                                   font-weight:600;">

	                        🛒 Add To Cart

	                    </button>

	                </form>

	            </div>

	        </div>

	    </div>

	</div>
	    <!-- ========================= -->
	    <!-- BACK TO DASHBOARD -->
	    <!-- ========================= -->

	    <div style="text-align:center;
	                margin-top:40px;
	                margin-bottom:50px;">

	        <a th:href="@{/dashboard}"
	           style="text-decoration:none;">

	            <button style="
	                    background:linear-gradient(90deg,#ff8c00,#ff5a00);
	                    color:white;
	                    border:none;
	                    padding:15px 35px;
	                    border-radius:40px;
	                    font-size:18px;
	                    font-weight:600;
	                    cursor:pointer;
	                    box-shadow:0 10px 25px rgba(255,140,0,.35);
	                    transition:.3s;">

						<!-- ========================= -->
						<!-- PAGINATION -->
						<!-- ========================= -->

						<div th:if="${totalPages > 1}"
						     style="display:flex;
						            justify-content:center;
						            align-items:center;
						            gap:10px;
						            margin:50px 0;
						            flex-wrap:wrap;">

						    <!-- Previous -->

						    <a th:if="${currentPage > 0}"
						       th:href="@{/menu(page=${currentPage-1},
						                        keyword=${keyword},
						                        category=${selectedCategory})}"
						       style="padding:12px 22px;
						              background:#ff8c00;
						              color:white;
						              border-radius:30px;
						              text-decoration:none;
						              font-weight:600;">

						        ← Previous

						    </a>

						    <!-- Page Numbers -->

						    <th:block th:each="i : ${#numbers.sequence(0,totalPages-1)}">

						        <a th:href="@{/menu(page=${i},
						                            keyword=${keyword},
						                            category=${selectedCategory})}"

						           th:text="${i+1}"

						           th:style="${i==currentPage}
						                ? 'padding:12px 18px;background:#ff8c00;color:white;border-radius:50%;text-decoration:none;font-weight:bold;'
						                : 'padding:12px 18px;background:white;color:#333;border-radius:50%;text-decoration:none;font-weight:bold;'">
						        </a>

						    </th:block>

						    <!-- Next -->

						    <a th:if="${currentPage < totalPages-1}"
						       th:href="@{/menu(page=${currentPage+1},
						                        keyword=${keyword},
						                        category=${selectedCategory})}"

						       style="padding:12px 22px;
						              background:#ff8c00;
						              color:white;
						              border-radius:30px;
						              text-decoration:none;
						              font-weight:600;">

						        Next →

						    </a>

						</div>					
	                ← Back To Dashboard

	            </button>

	        </a>

	    </div>

	</div>

	<!-- ========================= -->
	<!-- EXTRA STYLES -->
	<!-- ========================= -->

	<style>

	body{

	    background:url('/images/dashboard-bg.jpg') center center/cover no-repeat fixed;

	    min-height:100vh;

	}

	body::before{

	    content:"";

	    position:fixed;

	    inset:0;

	    background:rgba(0,0,0,.68);

	    z-index:-1;

	}

	.product-card{

	    transition:.35s;

	}

	.product-card:hover{

	    transform:translateY(-10px);

	    box-shadow:0 25px 50px rgba(0,0,0,.35);

	}

	.product-card img{

	    transition:.4s;

	}

	.product-card:hover img{

	    transform:scale(1.08);

	}

	button:hover{

	    transform:translateY(-2px);

	}

	input:focus,
	select:focus{

	    box-shadow:0 0 10px rgba(255,140,0,.45);

	}

	@media(max-width:768px){

	    .menu-title{

	        font-size:2.2rem !important;

	    }

	    form{

	        flex-direction:column;

	    }

	    form input,
	    form select,
	    form button,
	    form a{

	        width:100%;

	    }

	}

	</style>

	</body>

	</html>
