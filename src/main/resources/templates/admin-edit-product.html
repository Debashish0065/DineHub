<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Product | DineHub</title>

<link rel="stylesheet" th:href="@{/css/admin-edit-product.css}">

</head>

<body>

<div class="overlay"></div>

<div class="container">

    <h1>✏ Edit Product</h1>

    <div class="form-card">

        <form th:action="@{/admin/products/update}"
              method="post"
              th:object="${product}">

            <input type="hidden"
                   th:field="*{id}">

            <div class="form-grid">

                <div class="form-group">

                    <label>Product Name</label>

                    <input type="text"
                           th:field="*{productName}"
                           required>

                </div>

                <div class="form-group">

                    <label>Price</label>

                    <input type="number"
                           step="0.01"
                           th:field="*{price}"
                           required>

                </div>

                <div class="form-group">

                    <label>Quantity</label>

                    <input type="number"
                           th:field="*{quantity}"
                           required>

                </div>

                <div class="form-group">

                    <label>Image URL</label>

                    <input type="text"
                           th:field="*{imageUrl}"
                           required>

                </div>

                <div class="form-group">

                    <label>Category</label>

                    <select name="categoryId"
                            required>

                        <option
                                th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.categoryName}"
                                th:selected="${cat.id == product.category.id}">
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Availability</label>

                    <select th:field="*{available}">

                        <option th:value="true">

                            Available

                        </option>

                        <option th:value="false">

                            Out Of Stock

                        </option>

                    </select>

                </div>

            </div>

            <div class="form-group">

                <label>Description</label>

                <textarea rows="5"
                          th:field="*{description}">
                </textarea>

            </div>

            <div class="image-preview">

                <img th:src="${product.imageUrl}"
                     alt="Product">

            </div>

            <div class="buttons">

                <button class="save-btn"
                        type="submit">

                    💾 Update Product

                </button>

                <a th:href="@{/admin/products}"
                   class="cancel-btn">

                    ← Cancel

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
