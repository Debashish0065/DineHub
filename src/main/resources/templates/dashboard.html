<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>DineHub Dashboard</title>

<link rel="stylesheet"
      th:href="@{/css/dashboard.css}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

</head>

<body>

<!-- Background Overlay -->
<div class="overlay"></div>

<!-- Main Container -->
<div class="dashboard-container">

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <div class="logo">
            🍽 DineHub
        </div>

        <div class="nav-links">

            <a th:href="@{/dashboard}">
                Home
            </a>

            <a th:href="@{/menu}">
                Menu
            </a>

            <a th:href="@{/cart}">
                Cart
            </a>

            <a th:href="@{/orders}">
                My Orders
            </a>

            <a th:href="@{/profile}">
                My Profile
            </a>

            <a th:href="@{/logout}"
               class="logout-btn">

                Logout

            </a>

        </div>

    </nav>

    <!-- ================= HERO ================= -->

    <div class="hero-section">

        <h1>

            Welcome,

            <span th:text="${username}">
                User
            </span>

            👋

        </h1>

        <p>

            Delicious food delivered to your doorstep.

        </p>

        <a th:href="@{/menu}"
           class="explore-btn">

            🍔 Explore Menu

        </a>

    </div>

</div>

</body>

</html>
