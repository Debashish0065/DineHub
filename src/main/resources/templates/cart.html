<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>My Cart</title>

<link rel="stylesheet"
th:href="@{/css/cart.css}">

</head>

<body>

<div class="menu-container">

    <h1 class="menu-title">
        My Cart
    </h1>

    <!-- EMPTY CART -->

    <div th:if="${#lists.isEmpty(cartItems)}"
         class="empty-cart">

        <h2>
            Your Cart Is Empty
        </h2>

        <br><br>

        <a th:href="@{/menu}">

            <button class="explore-btn">

                Explore Menu

            </button>

        </a>

    </div>

    <!-- CART ITEMS -->

    <div class="cart-grid"
         th:if="${!#lists.isEmpty(cartItems)}">

        <div class="cart-card"
             th:each="item : ${cartItems}">

            <!-- FOOD IMAGE -->

            <img th:src="${item.product.imageUrl}"
                 alt="Food Image">

            <!-- DETAILS -->

            <div class="cart-details">

                <h2 th:text="${item.product.productName}">
                    Food Name
                </h2>

                <p th:text="${item.product.description}">
                    Description
                </p>

                <h3>

                    ₹<span th:text="${item.product.price}">
                    </span>

                </h3>

                <!-- QUANTITY -->

                <div class="quantity-box">

                    <!-- DECREASE -->

                    <form th:action="@{'/decrease/' + ${item.id}}"
                          method="post">

                        <button type="submit"
                                class="qty-btn">

                            -

                        </button>

                    </form>

                    <span class="qty-number"
                          th:text="${item.quantity}">
                    </span>

                    <!-- INCREASE -->

                    <form th:action="@{'/increase/' + ${item.id}}"
                          method="post">

                        <button type="submit"
                                class="qty-btn">

                            +

                        </button>

                    </form>

                </div>

                <h4>

                    Total:
                    ₹<span th:text="${item.price * item.quantity}">
                    </span>

                </h4>

                <!-- REMOVE BUTTON -->

                <form th:action="@{'/remove-from-cart/' + ${item.id}}"
                      method="post">

                    <button type="submit"
                            class="remove-btn">

                        Remove Item

                    </button>

                </form>

            </div>

        </div>

    </div>

    <!-- GRAND TOTAL -->

    <div class="cart-total"
         th:if="${!#lists.isEmpty(cartItems)}">

        <h2>

            Grand Total:
            ₹<span th:text="${totalAmount}">
            </span>

        </h2>

        <br>

        <!-- CHECKOUT BUTTON -->

        <div class="checkout-section">

            <a th:href="@{/checkout}">

                <button class="checkout-btn">

                    Proceed To Checkout

                </button>

            </a>

        </div>

    </div>

    <br><br>

    <!-- BACK BUTTON -->

    <div style="text-align:center;">

        <a th:href="@{/dashboard}">

            <button class="explore-btn">

                Back To Dashboard

            </button>

        </a>

    </div>

</div>

</body>
</html>
