<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>DineHub | Product Management</title>

<link rel="stylesheet"
      th:href="@{/css/admin-products.css}">

</head>

<body>

<div class="overlay"></div>

<div class="container">

    <div class="header">

        <h1>

            🍔 Product Management

        </h1>

        <a th:href="@{/admin/dashboard}"
           class="dashboard-btn">

            ← Back To Dashboard

        </a>

    </div>

    <!-- =========================== -->
    <!-- EDIT PRODUCT SECTION -->
    <!-- =========================== -->

    <div class="edit-panel">

        <h2>

            ✏ Edit Existing Product

        </h2>

        <p>

            Select a product from the list below and click
            <strong>Edit Selected Product</strong>.

        </p>

        <form id="editForm">

            <select id="productSelect">

                <option value="">

                    ----- Select Product -----

                </option>

                <option th:each="product : ${products}"
                        th:value="${product.id}"
                        th:text="${product.productName}">

                </option>

            </select>

            <button type="button"
                    class="edit-selected-btn"
                    onclick="editProduct()">

                ✏ Edit Selected Product

            </button>

        </form>

    </div>

    <!-- =========================== -->
    <!-- PRODUCT TABLE -->
    <!-- =========================== -->

    <div class="table-box">

        <table>

            <thead>

            <tr>

                <th>ID</th>

                <th>Image</th>

                <th>Product</th>

                <th>Category</th>

                <th>Price</th>

                <th>Quantity</th>

                <th>Status</th>

                <th>Delete</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="product : ${products}">

                <td th:text="${product.id}"></td>

                <td>

                    <img th:src="${product.imageUrl}"
                         alt="Food">

                </td>

                <td th:text="${product.productName}"></td>

                <td th:text="${product.category.categoryName}"></td>

                <td>

                    ₹<span th:text="${product.price}"></span>

                </td>

                <td th:text="${product.quantity}"></td>
				                <td>

				                    <span th:if="${product.available}"
				                          class="available">

				                        ✅ Available

				                    </span>

				                    <span th:unless="${product.available}"
				                          class="not-available">

				                        ❌ Out Of Stock

				                    </span>

				                </td>

				                <td>

				                    <a th:href="@{'/admin/products/delete/' + ${product.id}}"
				                       class="delete-btn"
				                       onclick="return confirm('Are you sure you want to delete this product?');">

				                        🗑 Delete

				                    </a>

				                </td>

				            </tr>

				            </tbody>

				        </table>

				    </div>

				</div>

				<!-- =========================== -->
				<!-- JAVASCRIPT -->
				<!-- =========================== -->

				<script>

				function editProduct() {

				    const productId = document.getElementById("productSelect").value;

				    if(productId === "") {

				        alert("Please select a product first.");

				        return;

				    }

				    window.location.href =
				        "/admin/products/edit/" + productId;

				}

				</script>

				</body>

				</html>
