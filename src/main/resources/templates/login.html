<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login | DineHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:url('/images/hero-bg.jpg') no-repeat center center;
background-size:cover;
min-height:100vh;

}

.overlay{

background:rgba(0,0,0,0.60);
min-height:100vh;

}

.navbar{

background:rgba(0,0,0,0.55);

}

.navbar-brand{

color:white !important;
font-size:35px;
font-weight:bold;

}

.navbar-brand span{

color:#ff9800;

}

.nav-link{

color:white !important;
margin-left:20px;

}

.login-card{

width:450px;
margin:90px auto;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
padding:40px;
border-radius:20px;
border:1px solid rgba(255,255,255,.20);
color:white;

}

.icon{

width:90px;
height:90px;
background:#ff9800;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
font-size:35px;
color:white;

}

.form-control{

background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.20);
color:white;

}

.form-control:focus{

background:rgba(255,255,255,.18);
color:white;
box-shadow:none;
border-color:#ff9800;

}

.form-control::placeholder{

color:#ddd;

}

.btn-login{

background:#ff9800;
color:white;
font-size:18px;
font-weight:bold;
border:none;

}

.btn-login:hover{

background:#e68900;

}

.footer{

text-align:center;
color:white;
padding:20px;

}

</style>

</head>

<body>

<div class="overlay">

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" th:href="@{/}">
<i class="fa-solid fa-utensils"></i>
Dine<span>Hub</span>
</a>

<div>

<a class="nav-link d-inline" th:href="@{/}">
Home
</a>

<a class="nav-link d-inline" th:href="@{/register}">
Register
</a>

</div>

</div>

</nav>

<div class="login-card">

<div class="icon">

<i class="fa-solid fa-user"></i>

</div>

<h2 class="text-center mt-4">

Welcome Back

</h2>

<p class="text-center">

Login to your DineHub account

</p>

<div th:if="${param.registered}" class="alert alert-success">

Registration Successful!
Please Login.

</div>

<div th:if="${param.error}" class="alert alert-danger">

Invalid Email or Password.

</div>

<div th:if="${param.logout}" class="alert alert-success">

Logged out successfully.

</div>

<form th:action="@{/login}" method="post">

<div class="mb-3">

<input
type="email"
name="username"
class="form-control"
placeholder="Email"
required>

</div>

<div class="mb-4">

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>

<button
type="submit"
class="btn btn-login w-100 p-3">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</form>

<div class="text-center mt-4">

Don't have an account?

<a
th:href="@{/register}"
class="text-warning text-decoration-none">

Register Here

</a>

</div>

</div>

<div class="footer">

© 2026 DineHub. All Rights Reserved.

</div>

</div>

</body>

</html>
