<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>My Orders | DineHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:#ff4500;

}

.container{

    width:92%;
    max-width:1300px;
    margin:40px auto;

}

h1{

    text-align:center;
    color:white;
    margin-bottom:35px;
    font-size:38px;

}

.empty{

    background:white;
    padding:60px;
    text-align:center;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);

}

.empty h2{

    margin-bottom:15px;

}

.empty p{

    color:#666;
    margin-bottom:20px;

}

.empty a{

    display:inline-block;
    text-decoration:none;
    padding:12px 24px;
    border-radius:10px;
    background:#ff6b35;
    color:white;
    font-weight:600;

}

.card{

    background:linear-gradient(135deg,#ff7b00,#ffb347);
    border-radius:18px;
    margin-bottom:30px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);

}

.top{

    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ececec;
    padding-bottom:18px;
    margin-bottom:22px;

}

.orderNo{

    font-size:22px;
    font-weight:700;
    color:#222;

}

.date{

    margin-top:8px;
    color:#888;

}

.amount{

    font-size:28px;
    font-weight:700;
    color:#ff6b35;

}

table{

    width:100%;
    border-collapse:collapse;
    margin-top:20px;

}

table th{

    background:#ff6b35;
    color:white;
    padding:14px;

}

table td{

    padding:15px;
    text-align:center;
    border-bottom:1px solid #ececec;

}

img{

    width:75px;
    height:75px;
    border-radius:10px;
    object-fit:cover;

}

.bottom{

    margin-top:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;

}

.payment-box{

    line-height:32px;

}

.payment-box b{

    color:#333;

}
/* ===========================
   ORDER STATUS
=========================== */

.status{

    padding:8px 18px;
    border-radius:30px;
    color:white;
    font-weight:600;
    font-size:14px;

}

.PENDING{

    background:#ff9800;

}

.CONFIRMED{

    background:#2196f3;

}

.PREPARING{

    background:#9c27b0;

}

.READY{

    background:#00bcd4;

}

.OUT_FOR_DELIVERY{

    background:#3f51b5;

}

.DELIVERED{

    background:#4caf50;

}

.CANCELLED{

    background:#f44336;

}

/* ===========================
   BUTTONS
=========================== */

.actions{

    display:flex;
    gap:12px;
    flex-wrap:wrap;

}

.btn{

    display:inline-block;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    color:white;
    font-weight:600;
    transition:.3s;

}

.details{

    background:#ff6b35;

}

.details:hover{

    background:#e55d25;

}

.cancel{

    background:#e53935;

}

.cancel:hover{

    background:#c62828;

}

.back{

    display:block;
    width:240px;
    margin:40px auto;
    text-align:center;
    text-decoration:none;
    background:#222;
    color:white;
    padding:14px;
    border-radius:10px;
    font-weight:600;
    transition:.3s;

}

.back:hover{

    background:#000;

}

/* ===========================
   RESPONSIVE
=========================== */

@media(max-width:900px){

    .top{

        flex-direction:column;
        align-items:flex-start;
        gap:15px;

    }

    .bottom{

        flex-direction:column;
        align-items:flex-start;

    }

    table{

        display:block;
        overflow-x:auto;

    }

}

</style>

</head>

<body>

<div class="container">

<h1>🍽 My Orders</h1>

<div class="empty"
     th:if="${#lists.isEmpty(orders)}">

    <h2>No Orders Found</h2>

    <p>You haven't placed any order yet.</p>

    <a th:href="@{/menu}">

        Explore Menu

    </a>

</div>

<div th:each="order : ${orders}"
     class="card">

<div class="top">

<div>

<div class="orderNo">

Order :
<span th:text="${order.orderNumber}"></span>

</div>

<div class="date">

<span th:text="${#temporals.format(order.createdAt,'dd MMM yyyy hh:mm a')}"></span>

</div>

</div>

<div class="amount">

₹<span th:text="${order.totalAmount}"></span>

</div>

</div>

<table>

<thead>

<tr>

<th>Image</th>

<th>Food</th>

<th>Qty</th>

<th>Price</th>

</tr>

</thead>

<tbody>

<tr th:each="item : ${order.orderItems}">

<td>

<img th:src="${item.product.imageUrl}" alt="Food">

</td>

<td th:text="${item.product.productName}"></td>

<td th:text="${item.quantity}"></td>

<td>

₹<span th:text="${item.price}"></span>

</td>

</tr>

</tbody>

</table>

<div class="bottom">

<div class="payment-box">

<p>

<b>Payment :</b>

<span th:text="${order.paymentMethod}"></span>

</p>

<p>

<b>Payment Status :</b>

<span th:text="${order.paymentStatus}"></span>

</p>

</div>

<div>

<span class="status"
      th:classappend="${order.status}"
      th:text="${order.status}">
</span>

</div>

<div class="actions">
	<a class="btn details"
	   th:href="@{/orders/{id}(id=${order.id})}">

	    📄 View Details

	</a>

	<form th:if="${order.status.name()=='PENDING' || order.status.name()=='CONFIRMED'}"
	      th:action="@{/orders/cancel/{id}(id=${order.id})}"
	      method="post">

	    <button type="submit"
	            class="btn cancel"
	            onclick="return confirm('Are you sure you want to cancel this order?')">

	        ❌ Cancel Order

	    </button>

	</form>

	</div>

	</div>

	</div>

	<a class="back"
	   th:href="@{/dashboard}">

	    ← Back To Dashboard

	</a>

	</div>

	</body>

	</html>
