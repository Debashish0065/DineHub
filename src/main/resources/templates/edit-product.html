<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Edit Product | DineHub</title>

<link rel="stylesheet"
      th:href="@{/css/admin-products.css}">

</head>

<body>

<div class="overlay"></div>

<div class="container">

    <h1>✏ Edit Product</h1>

    <div class="form-card">

        <form th:action="@{'/admin/products/update/' + ${product.id}}"
              th:object="${product}"
              method="post">

            <div class="form-grid">

                <input type="text"
                       th:field="*{productName}"
                       placeholder="Product Name"
                       required>

                <input type="number"
                       step="0.01"
                       th:field="*{price}"
                       placeholder="Price"
                       required>

                <input type="number"
                       th:field="*{quantity}"
                       placeholder="Quantity"
                       required>

                <input type="text"
                       th:field="*{imageUrl}"
                       placeholder="Image URL"
                       required>

                <select name="categoryId">

                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.categoryName}"
                            th:selected="${cat.id == product.category.id}">
                    </option>

                </select>

                <select th:field="*{available}">

                    <option th:value="true">
                        Available
                    </option>

                    <option th:value="false">
                        Out Of Stock
                    </option>

                </select>

            </div>

            <textarea th:field="*{description}"
                      rows="5"
                      placeholder="Description">
            </textarea>

            <br><br>

            <button class="add-btn"
                    type="submit">

                💾 Save Changes

            </button>

        </form>

        <br>

        <div style="text-align:center;">

            <a th:href="@{/admin/products}"
               class="dashboard-btn">

                ← Back to Products

            </a>

        </div>

    </div>

</div>

</body>

</html>
