<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Change Password | DineHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#ff7b00,#ffb347);

padding:40px;

}

.container{

width:100%;
max-width:600px;

}

.card{

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

padding:40px;

border-radius:25px;

box-shadow:0 15px 35px rgba(0,0,0,.25);

border:1px solid rgba(255,255,255,.25);

color:white;

}

.card h1{

text-align:center;

margin-bottom:30px;

font-size:34px;

}

.form-group{

margin-bottom:22px;

}

.form-group label{

display:block;

margin-bottom:8px;

font-weight:600;

}

.form-group input{

width:100%;

padding:14px;

border:none;

border-radius:12px;

outline:none;

font-size:15px;

background:white;

color:#333;

}

.buttons{

margin-top:30px;

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.btn{

padding:14px 28px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:15px;

font-weight:600;

transition:.3s;

text-decoration:none;

}

.change{

background:#28a745;

color:white;

}

.change:hover{

background:#218838;

}

.back{

background:#333;

color:white;

}

.back:hover{

background:#111;

}

.success{

background:#28a745;

padding:12px;

border-radius:10px;

margin-bottom:20px;

text-align:center;

}

.error{

background:#dc3545;

padding:12px;

border-radius:10px;

margin-bottom:20px;

text-align:center;

}

@media(max-width:768px){

.card{

padding:25px;

}

.card h1{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Change Password</h1>

<div th:if="${success}"
     class="success"
     th:text="${success}">
</div>

<div th:if="${error}"
     class="error"
     th:text="${error}">
</div>
<form th:action="@{/profile/change-password}"
      th:object="${changePasswordRequest}"
      method="post">

<div class="form-group">

<label>Old Password</label>

<input
    type="password"
    id="oldPassword"
    th:field="*{oldPassword}"
    placeholder="Enter Old Password"
    required>

</div>

<div class="form-group">

<label>New Password</label>

<input
    type="password"
    id="newPassword"
    th:field="*{newPassword}"
    placeholder="Enter New Password"
    required>

</div>

<div class="form-group">

<label>Confirm Password</label>

<input
    type="password"
    id="confirmPassword"
    th:field="*{confirmPassword}"
    placeholder="Confirm New Password"
    required>

</div>

<div style="margin-top:15px;margin-bottom:20px;">

<label style="display:flex;align-items:center;cursor:pointer;font-size:15px;">

<input
type="checkbox"
onclick="togglePassword()"
style="width:18px;height:18px;margin-right:10px;">

Show Passwords

</label>

</div>

<div class="buttons">

<button
type="submit"
class="btn change">

🔒 Change Password

</button>

<a
th:href="@{/profile}"
class="btn back">

← Back to Profile

</a>

</div>

</form>
</div>

</div>

<script>

function togglePassword() {

    const fields = [
        document.getElementById("oldPassword"),
        document.getElementById("newPassword"),
        document.getElementById("confirmPassword")
    ];

    fields.forEach(field => {
        if (field) {
            field.type = field.type === "password" ? "text" : "password";
        }
    });

}

</script>

</body>

</html>
