<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>DineHub | Customer Management</title>

<link rel="stylesheet"
      th:href="@{/css/admin-customers.css}">

</head>

<body>

<div class="overlay"></div>

<div class="container">

    <div class="header">

        <h1>

            👥 Customer Management

        </h1>

        <a th:href="@{/admin/dashboard}"
           class="dashboard-btn">

            ← Back To Dashboard

        </a>

    </div>

    <!-- ========================= -->
    <!-- SEARCH BAR -->
    <!-- ========================= -->

    <div class="search-box">

        <form th:action="@{/admin/customers}"
              method="get">

            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="Search by Name or Email">

            <button type="submit">

                🔍 Search

            </button>

        </form>

    </div>

    <!-- ========================= -->
    <!-- CUSTOMER TABLE -->
    <!-- ========================= -->

    <div class="table-box">

        <table>

            <thead>

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Email</th>

                <th>Phone</th>

                <th>Role</th>

                <th>Status</th>

                <th>Registered</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="customer : ${customers}">

                <td th:text="${customer.id}"></td>

                <td>

                    <span th:text="${customer.firstName}"></span>

                    <span th:text="${customer.lastName}"></span>

                </td>

                <td th:text="${customer.email}"></td>

                <td th:text="${customer.phone}"></td>

                <td>

                    <span class="role"
                          th:text="${customer.role}">
                    </span>

                </td>
				                <td>

				                    <span th:if="${customer.enabled}"
				                          class="active">

				                        🟢 Active

				                    </span>

				                    <span th:unless="${customer.enabled}"
				                          class="inactive">

				                        🔴 Disabled

				                    </span>

				                </td>

				                <td th:text="${#temporals.format(customer.createdAt,'dd MMM yyyy')}">

				                </td>

				            </tr>

				            <tr th:if="${#lists.isEmpty(customers)}">

				                <td colspan="7">

				                    No customers found.

				                </td>

				            </tr>

				            </tbody>

				        </table>

				    </div>

				</div>

				</body>

				</html>
