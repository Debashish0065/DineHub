<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin | Order Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f6f9;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.invoice{
background:#fff;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #eee;
padding-bottom:20px;
margin-bottom:25px;
}

.header h1{
color:#ff6b35;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

.card{
background:#fafafa;
padding:20px;
border-radius:12px;
}

.card p{
margin:10px 0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th{
background:#ff6b35;
color:white;
padding:12px;
}

table td{
padding:12px;
text-align:center;
border-bottom:1px solid #eee;
}

.food{
display:flex;
align-items:center;
gap:10px;
}

.food img{
width:65px;
height:65px;
border-radius:10px;
object-fit:cover;
}

.summary{
width:350px;
margin-left:auto;
margin-top:25px;
background:#fafafa;
padding:20px;
border-radius:12px;
}

.summary p{
display:flex;
justify-content:space-between;
margin:12px 0;
}

.total{
font-size:20px;
font-weight:bold;
color:#ff6b35;
}

.status{
display:inline-block;
padding:8px 18px;
border-radius:25px;
font-weight:600;
color:white;
}

.PENDING{
background:#ff9800;
}

.CONFIRMED{
background:#3f51b5;
}

.PREPARING{
background:#2196f3;
}

.READY{
background:#9c27b0;
}

.OUT_FOR_DELIVERY{
background:#673ab7;
}

.DELIVERED{
background:#4caf50;
}

.CANCELLED{
background:#f44336;
}

.buttons{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
}

.btn{
padding:12px 25px;
text-decoration:none;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
font-size:15px;
}

.back{
background:#0d6efd;
}

.print{
background:#28a745;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.header{
flex-direction:column;
gap:15px;
}

.food{
flex-direction:column;
}

.summary{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="invoice">

<div class="header">

<div>

<h1>DineHub Invoice</h1>

<p>
<b>Order Number :</b>
<span th:text="${order.orderNumber}"></span>
</p>

<p>
<b>Invoice :</b>
<span th:text="${order.invoiceNumber}"></span>
</p>

<p>
<b>Date :</b>
<span th:text="${#temporals.format(order.createdAt,'dd MMM yyyy hh:mm a')}"></span>
</p>

</div>

<div>

<span
class="status"
th:classappend="${order.status}"
th:text="${order.status}">
</span>

</div>

</div>

<div class="grid">

<div class="card">

<h3>Customer</h3>

<p>
<b>Name :</b>
<span th:text="${order.user.firstName+' '+order.user.lastName}"></span>
</p>

<p>
<b>Email :</b>
<span th:text="${order.user.email}"></span>
</p>

<p>
<b>Phone :</b>
<span th:text="${order.user.phone}"></span>
</p>

</div>

<div class="card">

<h3>Delivery</h3>

<p>
<b>Address :</b>
<span th:text="${order.deliveryAddress}"></span>
</p>

<p>
<b>Estimated Delivery :</b>
<span th:text="${#temporals.format(order.estimatedDeliveryTime,'dd MMM yyyy hh:mm a')}"></span>
</p>

<p th:if="${order.deliveredTime!=null}">
<b>Delivered :</b>
<span th:text="${#temporals.format(order.deliveredTime,'dd MMM yyyy hh:mm a')}"></span>
</p>

</div>

</div>

<h2>Ordered Items</h2>

<table>

<thead>

<tr>

<th>Food</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>

</tr>

</thead>

<tbody>

<tr th:each="item:${order.orderItems}">

<td>

<div class="food">

<img th:src="${item.product.imageUrl}">

<div>

<b th:text="${item.product.productName}"></b>

</div>

</div>

</td>

<td>

₹<span th:text="${item.price}"></span>

</td>

<td th:text="${item.quantity}"></td>

<td>

₹
<span th:text="${item.price.multiply(T(java.math.BigDecimal).valueOf(item.quantity))}"></span>

</td>

</tr>

</tbody>

</table>

<div class="summary">

<p>

<span>Payment Method</span>

<strong th:text="${order.paymentMethod}"></strong>

</p>

<p>

<span>Payment Status</span>

<strong th:text="${order.paymentStatus}"></strong>

</p>

<hr>

<p class="total">

<span>Total</span>

<span>

₹<span th:text="${order.totalAmount}"></span>

</span>

</p>

</div>

<div class="buttons">

<a
th:href="@{/admin/orders}"
class="btn back">

← Back

</a>

<button
class="btn print"
onclick="window.print()">

Print Invoice

</button>

</div>

</div>

</div>

</body>

</html>
