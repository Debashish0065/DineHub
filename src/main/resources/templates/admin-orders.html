<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Orders | DineHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f6f9;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
}

h1{
margin-bottom:25px;
color:#ff6b35;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
box-shadow:0 8px 20px rgba(0,0,0,.08);
border-radius:15px;
overflow:hidden;
}

thead{
background:#ff6b35;
color:white;
}

th,td{
padding:15px;
text-align:center;
}

tbody tr{
border-bottom:1px solid #eee;
}

tbody tr:hover{
background:#fafafa;
}

img{
width:60px;
height:60px;
border-radius:10px;
object-fit:cover;
}

select{

padding:8px;
border-radius:8px;

}

button{

padding:8px 16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#28a745;
color:white;

}

button:hover{

background:#1d8d36;

}

.view{

background:#0d6efd;
padding:8px 15px;
color:white;
text-decoration:none;
border-radius:8px;

}

.cancel{

background:#dc3545;

}

.badge{

padding:8px 14px;
border-radius:20px;
color:white;
font-size:13px;
font-weight:600;

}

.PENDING{
background:#ff9800;
}

.CONFIRMED{
background:#3f51b5;
}

.PREPARING{
background:#03a9f4;
}

.READY{
background:#9c27b0;
}

.OUT_FOR_DELIVERY{
background:#673ab7;
}

.DELIVERED{
background:#4caf50;
}

.CANCELLED{
background:#f44336;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.search{

padding:12px;
width:300px;
border-radius:10px;
border:1px solid #ccc;

}

</style>

</head>

<body>

<div class="container">

<div class="top">

<h1>Restaurant Orders</h1>

<input
type="text"
id="search"
class="search"
placeholder="Search Order..."
onkeyup="searchTable()">

</div>

<table id="orderTable">

<thead>

<tr>

<th>Order No</th>
<th>Customer</th>
<th>Total</th>
<th>Payment</th>
<th>Status</th>
<th>Created</th>
<th>Details</th>
<th>Update</th>
<th>Cancel</th>

</tr>

</thead>

<tbody>

<tr th:each="order : ${orders}">

<td th:text="${order.orderNumber}"></td>

<td th:text="${order.user.firstName+' '+order.user.lastName}"></td>

<td>

₹<span th:text="${order.totalAmount}"></span>

</td>

<td>

<div>

<b th:text="${order.paymentMethod}"></b>

<br>

<span th:text="${order.paymentStatus}"></span>

</div>

</td>

<td>

<span
class="badge"
th:classappend="${order.status}"
th:text="${order.status}">
</span>

</td>

<td>

<span
th:text="${#temporals.format(order.createdAt,'dd MMM yyyy HH:mm')}">
</span>

</td>

<td>

<a
class="view"
th:href="@{/admin/orders/{id}(id=${order.id})}">

View

</a>

</td>

<td>

<form
th:action="@{/admin/orders/update-status/{id}(id=${order.id})}"
method="post">

<select
name="status">

<option
th:each="status : ${statuses}"
th:value="${status}"
th:text="${status}"
th:selected="${status==order.status}">
</option>

</select>

<br><br>

<button>

Update

</button>

</form>

</td>

<td>

<form
th:action="@{/admin/orders/cancel/{id}(id=${order.id})}"
method="post">

<button
class="cancel">

Cancel

</button>

</form>

</td>

</tr>

</tbody>

</table>

</div>

<script>

function searchTable(){

let input=document.getElementById("search");

let filter=input.value.toUpperCase();

let table=document.getElementById("orderTable");

let tr=table.getElementsByTagName("tr");

for(let i=1;i<tr.length;i++){

let td=tr[i].getElementsByTagName("td")[0];

if(td){

let txt=td.textContent||td.innerText;

tr[i].style.display=
txt.toUpperCase().indexOf(filter)>-1?"":"none";

}

}

}

</script>

</body>

</html>
