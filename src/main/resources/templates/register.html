<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Account | DineHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:url('/images/register-bg.jpg') no-repeat center center;
    background-size:cover;
    min-height:100vh;
}

.overlay{
    background:rgba(0,0,0,0.60);
    min-height:100vh;
}

.navbar{
    background:rgba(0,0,0,0.55);
}

.navbar-brand{
    color:white !important;
    font-size:35px;
    font-weight:bold;
}

.navbar-brand span{
    color:#ff9800;
}

.nav-link{
    color:white !important;
    margin-left:20px;
}

.register-card{

    width:600px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:20px;
    padding:40px;
    color:white;
    margin:60px auto;
}

.icon-circle{

    width:90px;
    height:90px;
    background:#ff9800;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:40px;
    color:white;
}

.form-control{

    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    color:white;
}

.form-control:focus{

    background:rgba(255,255,255,0.15);
    color:white;
    border-color:#ff9800;
    box-shadow:none;
}

.form-control::placeholder{
    color:#dddddd;
}

textarea.form-control{
    resize:none;
}

.btn-register{

    background:#ff9800;
    color:white;
    border:none;
    font-size:18px;
    font-weight:bold;
}

.btn-register:hover{

    background:#e68900;
}

.footer{

    text-align:center;
    color:white;
    padding:20px;
}

.alert{
    border-radius:10px;
}

</style>

</head>

<body>

<div class="overlay">

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" th:href="@{/}">
<i class="fa-solid fa-utensils"></i>
Dine<span>Hub</span>
</a>

<div>

<a class="nav-link d-inline" th:href="@{/}">
Home
</a>

<a class="nav-link d-inline" th:href="@{/login}">
Login
</a>

<a class="btn btn-warning ms-3" th:href="@{/register}">
Register
</a>

</div>

</div>

</nav>

<div class="register-card">

<div class="icon-circle">
<i class="fa-solid fa-user-plus"></i>
</div>

<h2 class="text-center mt-4">
Create Your Account
</h2>

<p class="text-center mb-4">
Join DineHub and enjoy delicious food.
</p>

<!-- Success Message -->
<div th:if="${successMessage}" class="alert alert-success text-center">
    <i class="fa-solid fa-circle-check"></i>
    <span th:text="${successMessage}"></span>
</div>

<!-- Error Message -->
<div th:if="${errorMessage}" class="alert alert-danger text-center">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span th:text="${errorMessage}"></span>
</div>

<form th:action="@{/register}" th:object="${user}" method="post">

<div class="row">

<div class="col-md-6 mb-3">
<input
type="text"
class="form-control"
placeholder="First Name"
th:field="*{firstName}"
required>
</div>

<div class="col-md-6 mb-3">
<input
type="text"
class="form-control"
placeholder="Last Name"
th:field="*{lastName}"
required>
</div>

</div>

<div class="mb-3">
<input
type="email"
class="form-control"
placeholder="Email Address"
th:field="*{email}"
required>
</div>

<div class="mb-3">
<input
type="password"
class="form-control"
placeholder="Password"
th:field="*{password}"
required>
</div>

<div class="mb-3">
<input
type="password"
class="form-control"
placeholder="Confirm Password"
th:field="*{confirmPassword}"
required>
</div>

<div class="mb-3">
<input
type="text"
class="form-control"
placeholder="Phone Number"
th:field="*{phone}"
required>
</div>

<div class="mb-4">
<textarea
rows="3"
class="form-control"
placeholder="Address"
th:field="*{address}">
</textarea>
</div>

<button type="submit" class="btn btn-register w-100 p-3">
<i class="fa-solid fa-user-plus"></i>
Register
</button>

</form>

<div class="text-center mt-4">

Already have an account?

<a th:href="@{/login}" class="text-warning text-decoration-none">

Login

</a>

</div>

</div>

<div class="footer">

© 2026 DineHub. All Rights Reserved.

</div>

</div>

</body>

</html>
